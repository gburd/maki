# Static binary builds using musl.
# In Nix devShell:  just static
# Outside Nix:     install musl-gcc, rustup target add x86_64-unknown-linux-musl
[target.x86_64-unknown-linux-musl]
linker = "musl-gcc"
rustflags = ["-C", "target-feature=+crt-static"]

[target.aarch64-unknown-linux-musl]
linker = "musl-gcc"
rustflags = ["-C", "target-feature=+crt-static"]
